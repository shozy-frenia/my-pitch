<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — OCD-Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #FAFAF7;
      color: #14171F;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .auth-box {
      background: #FAFAF7;
      border: 1px solid #DFDDD3;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
    }
    .auth-box h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .auth-box .sub {
      color: #565A64;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .auth-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #DFDDD3;
      background: #FAFAF7;
      margin-bottom: 12px;
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      outline: none;
      transition: .15s;
    }
    .auth-box input:focus {
      border-color: #3B3FA0;
      box-shadow: 0 0 0 2px #EAE9F6;
    }
    .auth-box .btn {
      width: 100%;
      padding: 14px;
      background: #14171F;
      color: #FAFAF7;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: .15s;
    }
    .auth-box .btn:hover { background: #2A2D78; }
    .auth-box .switch {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #565A64;
    }
    .auth-box .switch a {
      color: #3B3FA0;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }
    .auth-box .switch a:hover { text-decoration: underline; }
    .auth-box .error {
      color: #B84438;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .auth-box .success {
      color: #2FA88E;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #14171F;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 50%;
      background: conic-gradient(#2FA88E 0 40%, #C97A1F 40% 72%, #B84438 72% 100%);
      flex: none;
    }
    .google-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid #DFDDD3;
      background: #FAFAF7;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: .15s;
      font-family: 'IBM Plex Sans', sans-serif;
      margin-top: 8px;
    }
    .google-btn:hover { background: #ECEAE1; }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 16px 0;
      color: #8A8D95; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #DFDDD3;
    }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="brand"><span class="brand-mark"></span>OCD‑Monitor</div>

    <!-- Login form -->
    <div id="loginForm">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your account</p>
      <form id="loginFormEl" onsubmit="return handleLogin(event)">
        <input type="text" id="loginUsername" placeholder="Username" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="btn">Sign in</button>
      </form>
      <div class="divider">or</div>
      <button class="google-btn" id="googleSignInBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google" />
        Sign in with Google
      </button>
      <div class="switch">Don't have an account? <a id="switchToRegister">Create one</a></div>
      <div id="loginError" class="error"></div>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none;">
      <h1>Create account</h1>
      <p class="sub">Join OCD-Monitor</p>
      <form id="registerFormEl" onsubmit="return handleRegister(event)">
        <input type="text" id="regUsername" placeholder="Username" required />
        <input type="email" id="regEmail" placeholder="Email (optional)" />
        <input type="password" id="regPassword" placeholder="Password" required />
        <button type="submit" class="btn">Register</button>
      </form>
      <div class="divider">or</div>
      <button class="google-btn" id="googleSignUpBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google" />
        Sign up with Google
      </button>
      <div class="switch">Already have an account? <a id="switchToLogin">Sign in</a></div>
      <div id="regError" class="error"></div>
    </div>
  </div>

  <script>
    // ===== localStorage =====
    const USERS_KEY = 'ocd_users';
    const SESSION_KEY = 'ocd_session';

    function getUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
    }
    function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function setSession(username) { localStorage.setItem(SESSION_KEY, username); }

    // Switch forms
    document.getElementById('switchToRegister').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    });
    document.getElementById('switchToLogin').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    });

    // Login
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      if (!username || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return false;
      }
      const users = getUsers();
      const user = users[username];
      if (!user || user.password !== password) {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
        return false;
      }
      setSession(username);
      window.location.href = 'app.html';
      return false;
    }

    // Register
    function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      const errorEl = document.getElementById('regError');
      errorEl.style.display = 'none';

      if (!username || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return false;
      }
      const users = getUsers();
      if (users[username]) {
        errorEl.textContent = 'Username already exists.';
        errorEl.style.display = 'block';
        return false;
      }
      users[username] = {
        password: password,
        attemptsUsed: 0,
        subscription: null,
        history: [],
        consultAccess: false
      };
      saveUsers(users);
      setSession(username);
      window.location.href = 'app.html';
      return false;
    }

    // Google OAuth (simplified demo)
    document.getElementById('googleSignInBtn').addEventListener('click', function() {
      const name = prompt('Enter your name (demo):', 'user');
      if (name) {
        const users = getUsers();
        if (!users[name]) {
          users[name] = { password: 'google', attemptsUsed: 0, subscription: null, history: [], consultAccess: false };
          saveUsers(users);
        }
        setSession(name);
        window.location.href = 'app.html';
      }
    });
    document.getElementById('googleSignUpBtn').addEventListener('click', function() {
      document.getElementById('googleSignInBtn').click();
    });
  </script>
</body>
</html>
