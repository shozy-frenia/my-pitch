<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — OCD-Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #FAFAF7;
      color: #14171F;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .auth-box {
      background: #FAFAF7;
      border: 1px solid #DFDDD3;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .auth-box h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .auth-box .sub {
      color: #565A64;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .brand {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #14171F;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 50%;
      background: conic-gradient(#2FA88E 0 40%, #C97A1F 40% 72%, #B84438 72% 100%);
      flex: none;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #14171F;
      color: #FAFAF7;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: .15s;
      text-decoration: none;
      text-align: center;
      margin-bottom: 12px;
    }
    .btn:hover { background: #2A2D78; }
    .btn-google {
      background: #FFFFFF;
      color: #14171F;
      border: 1px solid #DFDDD3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover { background: #F0F0F0; border-color: #3B3FA0; }
    .divider {
      display: flex; align-items: center; gap: 16px; margin: 20px 0;
      color: #8A8D95; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ""; flex: 1; height: 1px; background: #DFDDD3;
    }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #565A64;
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover { color: #3B3FA0; }
    .btn-disabled {
      background: #ECEAE1;
      color: #8A8D95;
      cursor: not-allowed;
    }
    .btn-disabled:hover { background: #ECEAE1; }
  </style>
</head>
<body>

<div class="auth-box">
  <div class="brand">
    <span class="brand-mark"></span>
    OCD‑Monitor
  </div>

  <h1>Sign in</h1>
  <p class="sub">Choose how you want to continue</p>

  <!-- Кнопка входа через Google -->
  <a href="login_google.html" class="btn btn-google">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google" />
    Sign in with Google
  </a>

  <div class="divider">or</div>

  <!-- Обычный вход (заглушка) -->
  <a href="#" class="btn btn-disabled">Email & password (coming soon)</a>

  <a href="index.html" class="back-link">← Back to home</a>
</div>

</body>
</html>
