<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — NeuroCheck.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===== base styles ===== */
    :root {
      --paper: #FAFAF7;
      --panel: #F1F0E9;
      --panel-2: #ECEAE1;
      --ink: #14171F;
      --ink-soft: #565A64;
      --ink-faint: #8A8D95;
      --line: #DFDDD3;
      --accent: #3B3FA0;
      --accent-ink: #2A2D78;
      --accent-soft: #EAE9F6;
      --state-normal: #2FA88E;
      --state-anxious: #C97A1F;
      --state-crisis: #B84438;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      padding: 20px;
      line-height: 1.5;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .card .sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
    .stat-box {
      border: 1px solid var(--line);
      padding: 16px;
      background: var(--paper);
    }
    .stat-box .label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-faint); font-family: 'IBM Plex Mono'; }
    .stat-box .value { font-size: 22px; font-weight: 600; font-family: 'Space Grotesk'; margin-top: 4px; }

    .btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      transition: .15s;
      display: inline-block;
      text-decoration: none;
    }
    .btn-primary { background: var(--ink); color: var(--paper); }
    .btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
    .btn-success { background: var(--state-normal); color: var(--paper); border-color: var(--state-normal); }
    .btn-success:hover { background: #1e7a66; }
    .btn-danger { background: var(--state-crisis); color: var(--paper); border-color: var(--state-crisis); }
    .btn-danger:hover { background: #8a2e24; }
    .btn-outline { background: transparent; }
    .btn-outline:hover { background: var(--panel); }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 16px 0; }

    .day-inputs { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
    .day-inputs label { display: flex; flex-direction: column; align-items: center; font-size: 12px; }
    .day-inputs input { width: 56px; text-align: center; padding: 6px; border: 1px solid var(--line); background: var(--paper); font-family: 'IBM Plex Sans'; }

    .result-box {
      margin-top: 12px;
      background: var(--panel);
      padding: 16px;
      white-space: pre-wrap;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      border: 1px solid var(--line);
      display: none;
    }
    .error-msg { color: var(--state-crisis); font-size: 13px; margin-top: 8px; display: none; }

    .history-item {
      border-bottom: 1px solid var(--line);
      padding: 10px 0;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .history-item:hover { background: var(--panel-2); }
    .history-item:last-child { border-bottom: none; }
    .history-item .date { font-size: 12px; color: var(--ink-faint); }
    .history-item .preview { color: var(--ink-soft); font-size: 13px; }

    /* Modal for history details */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(20,23,31,0.6); backdrop-filter: blur(6px);
      z-index: 999; justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--paper);
      border: 1px solid var(--line);
      max-width: 600px; width: 90%; padding: 32px;
      position: relative;
      animation: modalIn 0.3s ease;
      max-height: 80vh;
      overflow-y: auto;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
    .modal-box .close {
      position: absolute; top: 12px; right: 16px;
      font-size: 24px; cursor: pointer; background: none; border: none; color: var(--ink-soft);
    }
    .modal-box .close:hover { color: var(--ink); }
    .modal-box h2 { font-family: 'Space Grotesk'; font-weight: 600; font-size: 24px; margin-bottom: 4px; }
    .modal-box .sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 20px; }
    .modal-box pre {
      background: var(--panel);
      padding: 16px;
      white-space: pre-wrap;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>

<div class="container">
  <!-- header -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--line); margin-bottom:20px;">
    <div class="brand" style="display:flex; align-items:center; gap:10px; font-family:'Space Grotesk'; font-weight:700; font-size:18px;">
      <span style="width:22px; height:22px; border-radius:50%; background:conic-gradient(#2FA88E 0 40%, #C97A1F 40% 72%, #B84438 72% 100%);"></span>
      NeuroCheck.ai
    </div>
    <div>
      <span id="userDisplay" style="font-weight:500; margin-right:12px;"></span>
      <a href="login.html" class="btn btn-outline" style="font-size:12px; padding:6px 14px;">Log out</a>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="card">
    <h2>👋 Hello, <span id="dashUsername"></span>!</h2>
    <p class="sub">Your dashboard</p>
    <div class="grid-2">
      <div class="stat-box"><div class="label">Attempts left</div><div class="value" id="dashAttempts">5</div></div>
      <div class="stat-box"><div class="label">Subscription</div><div class="value" id="dashSubscription">None</div></div>
      <div class="stat-box"><div class="label">History entries</div><div class="value" id="dashHistoryCount">0</div></div>
      <div class="stat-box"><div class="label">Consultations</div><div class="value" id="dashConsult">❌</div></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="dashStartMonitor">🧠 Start monitoring</button>
      <button class="btn btn-outline" id="dashShowHistory">📜 History</button>
      <button class="btn btn-success" id="dashConsultBtn">💬 Consultation</button>
    </div>

    <!-- History container -->
    <div id="dashHistoryContainer" style="display:none; max-height:200px; overflow-y:auto; background:var(--panel); padding:12px; border:1px solid var(--line); margin-top:12px;"></div>

    <!-- Monitor container -->
    <div id="dashMonitorContainer" style="display:none; margin-top:16px;">
      <p>Enter anxiety level for each day (0–10):</p>
      <div class="day-inputs" id="dayInputs"></div>
      <button class="btn btn-primary" id="computeResultsBtn">📊 Get results</button>
      <div class="result-box" id="monitorResultBox"></div>
      <div class="error-msg" id="monitorError"></div>
    </div>
  </div>
</div>

<!-- Modal for history details -->
<div class="modal-overlay" id="historyDetailModal">
  <div class="modal-box">
    <button class="close" id="closeHistoryModal">&times;</button>
    <h2>📄 History details</h2>
    <p class="sub" id="historyDetailDate"></p>
    <pre id="historyDetailContent"></pre>
  </div>
</div>

<script>
  // ===== localStorage =====
  const USERS_KEY = 'ocd_users';
  const SESSION_KEY = 'ocd_session';

  function getUsers() {
    try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
  }
  function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
  function getSession() { return localStorage.getItem(SESSION_KEY) || null; }
  function setSession(username) { localStorage.setItem(SESSION_KEY, username); }
  function clearSession() { localStorage.removeItem(SESSION_KEY); }

  function getUser(username) {
    const users = getUsers();
    return users[username] || null;
  }
  function updateUser(username, data) {
    const users = getUsers();
    users[username] = data;
    saveUsers(users);
  }

  // ===== Session =====
  let currentUser = getSession();
  if (!currentUser) {
    window.location.href = 'login.html';
  }

  const user = getUser(currentUser);
  if (!user) {
    clearSession();
    window.location.href = 'login.html';
  }

  // ===== Helpers =====
  function getAttemptsLeft(u) {
    // === ИЗМЕНЕНИЕ: БЕСПЛАТНЫХ ПОПЫТОК ТЕПЕРЬ 5 (БЫЛО 2) ===
    if (u.subscription === 'premium') return Infinity;
    if (u.subscription === 'basic') {
      const total = 2 + 5; // 2 базовых + 5 от подписки (можно оставить или тоже увеличить)
      return Math.max(0, total - u.attemptsUsed);
    }
    return Math.max(0, 5 - u.attemptsUsed); // было 2, стало 5
  }

  // ===== UI Updates =====
  function updateDashboard() {
    const u = getUser(currentUser);
    if (!u) return;
    document.getElementById('dashUsername').textContent = currentUser;
    document.getElementById('userDisplay').textContent = currentUser;
    const attempts = getAttemptsLeft(u);
    document.getElementById('dashAttempts').textContent = attempts === Infinity ? '∞' : attempts;
    document.getElementById('dashSubscription').textContent = u.subscription ? u.subscription.toUpperCase() : 'None';
    document.getElementById('dashHistoryCount').textContent = (u.history || []).length;
    const consultAccess = u.subscription === 'premium' || u.consultAccess;
    document.getElementById('dashConsult').textContent = consultAccess ? '✅ Available' : '❌ Not available';

    const startBtn = document.getElementById('dashStartMonitor');
    if (attempts <= 0) {
      startBtn.textContent = '🔒 Subscribe';
      startBtn.onclick = () => { window.location.href = 'payment.html'; };
    } else {
      startBtn.textContent = '🧠 Start monitoring';
      startBtn.onclick = startMonitor;
    }
    document.getElementById('dashHistoryContainer').style.display = 'none';
    document.getElementById('dashMonitorContainer').style.display = 'none';
  }

  // ===== Monitoring =====
  function startMonitor() {
    const container = document.getElementById('dayInputs');
    container.innerHTML = '';
    for (let i = 1; i <= 7; i++) {
      const label = document.createElement('label');
      label.innerHTML = `Day ${i} <input type="number" min="0" max="10" step="0.1" id="day${i}" value="5" />`;
      container.appendChild(label);
    }
    document.getElementById('dashMonitorContainer').style.display = 'block';
    document.getElementById('monitorResultBox').style.display = 'none';
    document.getElementById('monitorError').style.display = 'none';
    document.getElementById('dashHistoryContainer').style.display = 'none';
  }

  document.getElementById('computeResultsBtn').addEventListener('click', function() {
    const days = [];
    for (let i = 1; i <= 7; i++) {
      const val = parseFloat(document.getElementById('day' + i).value);
      if (isNaN(val) || val < 0 || val > 10) {
        document.getElementById('monitorError').textContent = 'Please enter numbers between 0 and 10.';
        document.getElementById('monitorError').style.display = 'block';
        return;
      }
      days.push(val);
    }
    const n = days.length;
    const mean = days.reduce((a,b) => a+b, 0) / n;
    const variance = days.reduce((s,x) => s + (x-mean)**2, 0) / (n-1);
    const stdDev = Math.sqrt(variance);
    const z = 1.96;
    const margin = z * stdDev / Math.sqrt(n);
    const ciLow = mean - margin;
    const ciHigh = mean + margin;
    const prior = 0.02;
    const likelihood = 0.6;
    const evidence = 0.6;
    const posterior = (likelihood * prior) / evidence;
    const last = days[days.length-1];
    let diagnosis = '';
    if (last < ciLow) diagnosis = '✅ Normal (positive dynamics)';
    else if (last > ciHigh) diagnosis = '⚠️ Anxiety signal – consultation recommended';
    else diagnosis = '🟡 Within normal range – continue monitoring';

    const resultText =
`📊 7‑day monitoring results
Mean: ${mean.toFixed(2)}
Std dev: ${stdDev.toFixed(2)}
95% CI: [${ciLow.toFixed(2)} ; ${ciHigh.toFixed(2)}]
Bayesian OCD probability: ${(posterior*100).toFixed(2)}%
Diagnosis: ${diagnosis}
Values: ${days.map(d => d.toFixed(1)).join(', ')}`;

    const resultBox = document.getElementById('monitorResultBox');
    resultBox.textContent = resultText;
    resultBox.style.display = 'block';
    document.getElementById('monitorError').style.display = 'none';

    const u = getUser(currentUser);
    if (u) {
      u.attemptsUsed = (u.attemptsUsed || 0) + 1;
      if (!u.history) u.history = [];
      u.history.push({ date: new Date().toLocaleString(), result: resultText, days: days });
      updateUser(currentUser, u);
      updateDashboard();
      if (getAttemptsLeft(u) <= 0) {
        setTimeout(() => {
          alert('You have used all free attempts. Please subscribe.');
          window.location.href = 'payment.html';
        }, 500);
      }
    }
    this.disabled = true;
    setTimeout(() => { this.disabled = false; }, 1000);
  });

  // ===== History =====
  function renderHistory() {
    const container = document.getElementById('dashHistoryContainer');
    const u = getUser(currentUser);
    if (!u || !u.history || u.history.length === 0) {
      container.innerHTML = '<p style="color:var(--ink-soft);">No history yet.</p>';
      return;
    }
    container.innerHTML = u.history.map((entry, idx) => {
      const preview = entry.result.split('\n').slice(0,2).join(' ') + '…';
      return `<div class="history-item" data-index="${idx}">
        <strong>#${idx+1}</strong> <span class="date">${entry.date}</span><br>
        <span class="preview">${preview}</span>
      </div>`;
    }).join('');

    // Add click handlers
    container.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', function() {
        const idx = parseInt(this.dataset.index);
        const entry = u.history[idx];
        if (!entry) return;
        document.getElementById('historyDetailDate').textContent = entry.date;
        document.getElementById('historyDetailContent').textContent = entry.result;
        document.getElementById('historyDetailModal').classList.add('active');
        document.body.style.overflow = 'hidden';
      });
    });
  }

  document.getElementById('dashShowHistory').addEventListener('click', function() {
    const container = document.getElementById('dashHistoryContainer');
    if (container.style.display === 'block') {
      container.style.display = 'none';
      return;
    }
    renderHistory();
    container.style.display = 'block';
    document.getElementById('dashMonitorContainer').style.display = 'none';
  });

  // Close history modal
  document.getElementById('closeHistoryModal').addEventListener('click', function() {
    document.getElementById('historyDetailModal').classList.remove('active');
    document.body.style.overflow = '';
  });
  document.getElementById('historyDetailModal').addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('active');
      document.body.style.overflow = '';
    }
  });

  // ===== Consultation =====
  document.getElementById('dashConsultBtn').addEventListener('click', function() {
    const u = getUser(currentUser);
    if (!u) return;
    const hasAccess = u.subscription === 'premium' || u.consultAccess;
    if (!hasAccess) {
      alert('Consultation access is only available with a Premium subscription.');
      window.location.href = 'payment.html';
      return;
    }
    window.open('https://t.me/ocdsolverbot', '_blank');
  });

  // ===== Init =====
  updateDashboard();
</script>
</body>
</html>
