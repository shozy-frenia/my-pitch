<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscribe — NeuroCheck.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- CloudPayments Widget -->
  <script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #FAFAF7;
      color: #14171F;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .payment-box {
      background: #FAFAF7;
      border: 1px solid #DFDDD3;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #14171F;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 50%;
      background: conic-gradient(#2FA88E 0 40%, #C97A1F 40% 72%, #B84438 72% 100%);
      flex: none;
    }
    h1 { font-family: 'Space Grotesk'; font-weight: 600; font-size: 28px; letter-spacing: -0.01em; }
    .sub { color: #565A64; margin-bottom: 24px; font-size: 14px; }

    .payment-plans { display: flex; gap: 16px; margin: 16px 0; }
    .payment-plans .plan {
      flex: 1; border: 2px solid #DFDDD3; padding: 16px; text-align: center;
      cursor: pointer; transition: .15s;
      background: #FAFAF7;
    }
    .payment-plans .plan:hover { border-color: #3B3FA0; }
    .payment-plans .plan.selected { border-color: #3B3FA0; background: #EAE9F6; }
    .payment-plans .plan .price { font-size: 24px; font-weight: 700; font-family: 'Space Grotesk'; color: #2A2D78; }
    .payment-plans .plan .period { font-size: 12px; color: #8A8D95; }
    .payment-plans .plan .features { font-size: 12px; margin-top: 6px; color: #565A64; }

    .btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 14px;
      border: 1px solid #14171F;
      background: #14171F;
      color: #FAFAF7;
      cursor: pointer;
      transition: .15s;
      width: 100%;
      margin-top: 8px;
    }
    .btn:hover { background: #2A2D78; border-color: #2A2D78; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-link {
      display: block; text-align: center; margin-top: 16px;
      color: #565A64; font-size: 13px; text-decoration: none;
    }
    .back-link:hover { color: #14171F; }

    .status-msg {
      display: none; text-align: center; padding: 20px;
      margin-top: 16px;
      border-radius: 4px;
    }
    .status-msg.loading { display: block; background: #EAE9F6; border: 1px solid #3B3FA0; }
    .status-msg.success { display: block; background: #E6F4EA; border: 1px solid #2FA88E; }
    .status-msg.error { display: block; background: #FDE8E5; border: 1px solid #B84438; }
    .status-msg .icon { font-size: 36px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="payment-box">
    <div class="brand"><span class="brand-mark"></span>NeuroCheck.ai</div>
    <h1>💎 Subscribe</h1>
    <p class="sub">Choose your plan and complete payment</p>

    <div class="payment-plans">
      <div class="plan" data-plan="basic" onclick="selectPlan('basic')">
        <div class="price">$5</div><div class="period">/ month</div>
        <div class="features">+5 attempts<br>Basic support</div>
      </div>
      <div class="plan" data-plan="premium" onclick="selectPlan('premium')">
        <div class="price">$10</div><div class="period">/ month</div>
        <div class="features">Unlimited<br>Priority support<br>Consultations<br>🤖 AI Assistant 24/7</div>
      </div>
    </div>

    <button class="btn" id="payBtn">💳 Pay with CloudPayments</button>
    <div id="statusMsg" class="status-msg"></div>

    <a href="/my-pitch/app.html" class="back-link">← Back to dashboard</a>
  </div>

  <script>
    // ===== Конфигурация =====
    // ⚠️ ЗАМЕНИ НА СВОИ КЛЮЧИ ИЗ ЛИЧНОГО КАБИНЕТА CLOUDPAYMENTS
    const CLOUD_PAYMENTS_PUBLIC_ID = 'pk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'; // ТВОЙ PUBLIC ID
    const CLOUD_PAYMENTS_API_URL = 'https://api.cloudpayments.ru';

    // ===== localStorage =====
    const USERS_KEY = 'ocd_users';
    const SESSION_KEY = 'ocd_session';

    function getUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
    }
    function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function getSession() { return localStorage.getItem(SESSION_KEY) || null; }
    function getUser(username) {
      const users = getUsers();
      return users[username] || null;
    }
    function updateUser(username, data) {
      const users = getUsers();
      users[username] = data;
      saveUsers(users);
    }

    const currentUser = getSession();
    if (!currentUser) {
      alert('You are not logged in. Please log in first.');
      window.location.href = '/my-pitch/login.html';
    }

    let selectedPlan = null;

    function selectPlan(plan) {
      selectedPlan = plan;
      document.querySelectorAll('.payment-plans .plan').forEach(el => el.classList.remove('selected'));
      document.querySelector(`.payment-plans .plan[data-plan="${plan}"]`).classList.add('selected');
    }

    // ===== ОСНОВНАЯ ФУНКЦИЯ ОПЛАТЫ =====
    document.getElementById('payBtn').addEventListener('click', function() {
      if (!selectedPlan) {
        showStatus('Please select a plan.', 'error');
        return;
      }

      const user = getUser(currentUser);
      if (!user) {
        showStatus('User not found. Please log in again.', 'error');
        return;
      }

      const planName = selectedPlan === 'basic' ? 'Basic' : 'Premium';
      const planPrice = selectedPlan === 'basic' ? 5.00 : 10.00;
      const userEmail = user.email || currentUser + '@neurocheck.ai';

      showStatus('⏳ Opening payment window...', 'loading');

      try {
        // Создаём виджет CloudPayments
        const widget = new cp.CloudPayments({
          language: 'en-US'
        });

        // Вызываем оплату с подпиской (рекуррентный платёж)
        widget.charge({
          publicId: CLOUD_PAYMENTS_PUBLIC_ID,
          description: `NeuroCheck.ai — ${planName} subscription`,
          amount: planPrice,
          currency: 'USD',
          accountId: currentUser,
          invoiceId: `sub-${currentUser}-${Date.now()}`,
          skin: 'mini',
          data: {
            user: currentUser,
            plan: selectedPlan,
            planName: planName,
            cloudPayments: {
              recurrent: {
                interval: 'Month',
                period: 1,
                customerReceipt: {
                  Items: [{
                    label: `NeuroCheck.ai — ${planName} subscription`,
                    price: planPrice,
                    quantity: 1.00,
                    amount: planPrice,
                    vat: null,
                    method: 4,
                    object: 4
                  }],
                  taxationSystem: 1,
                  email: userEmail,
                  amounts: {
                    electronic: planPrice,
                    advancePayment: 0.00,
                    credit: 0.00,
                    provision: 0.00
                  }
                }
              }
            }
          }
        },
        // Callback при успешной оплате
        function(options) {
          console.log('✅ Payment success:', options);
          const userData = getUser(currentUser);
          if (userData) {
            userData.subscription = selectedPlan;
            if (selectedPlan === 'premium') {
              userData.consultAccess = true;
              // Добавляем флаг для AI-доступа
              userData.aiAccess = true;
            }
            if (!userData.transactions) userData.transactions = [];
            userData.transactions.push({
              date: new Date().toISOString(),
              transactionId: options.transactionId || 'unknown',
              plan: selectedPlan,
              amount: planPrice
            });
            updateUser(currentUser, userData);
          }
          showStatus('✅ Payment successful! Your subscription is active.', 'success');
          setTimeout(() => {
            window.location.href = '/my-pitch/app.html';
          }, 2000);
        },
        // Callback при ошибке или отмене
        function(reason, options) {
          console.error('❌ Payment failed:', reason, options);
          if (reason === 'User closed widget') {
            showStatus('Payment was cancelled. You can try again.', 'error');
          } else {
            showStatus(`Payment failed: ${reason || 'Unknown error'}`, 'error');
          }
        });
      } catch (err) {
        console.error('❌ Widget error:', err);
        showStatus(`Error: ${err.message}`, 'error');
      }
    });

    function showStatus(message, type) {
      const el = document.getElementById('statusMsg');
      el.className = 'status-msg';
      if (type === 'loading') {
        el.className = 'status-msg loading';
        el.innerHTML = `<div class="icon">⏳</div><p>${message}</p>`;
      } else if (type === 'success') {
        el.className = 'status-msg success';
        el.innerHTML = `<div class="icon">✅</div><p>${message}</p>`;
      } else if (type === 'error') {
        el.className = 'status-msg error';
        el.innerHTML = `<div class="icon">❌</div><p>${message}</p>`;
      }
      el.style.display = 'block';
    }

    selectPlan('basic');
  </script>
</body>
</html>
