<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant — NeuroCheck.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #FAFAF7;
      color: #14171F;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      background: #14171F;
      color: #FAFAF7;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #DFDDD3;
      flex-shrink: 0;
    }
    .chat-header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 18px;
    }
    .chat-header .brand-mark {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: conic-gradient(#2FA88E 0 40%, #C97A1F 40% 72%, #B84438 72% 100%);
      flex: none;
    }
    .chat-header .back-btn {
      background: none;
      border: 1px solid #565A64;
      color: #B9B8C8;
      padding: 6px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
      transition: .15s;
    }
    .chat-header .back-btn:hover {
      background: #2A2D78;
      border-color: #6266A8;
      color: #fff;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #FAFAF7;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #3B3FA0;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai {
      align-self: flex-start;
      background: #F1F0E9;
      color: #14171F;
      border-bottom-left-radius: 4px;
      border: 1px solid #DFDDD3;
    }
    .message .time {
      font-size: 10px;
      color: #8A8D95;
      margin-top: 4px;
      display: block;
      text-align: right;
    }
    .chat-input-area {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #DFDDD3;
      flex-shrink: 0;
      align-items: center;
    }
    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #DFDDD3;
      border-radius: 24px;
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      outline: none;
      transition: .15s;
    }
    .chat-input-area input:focus {
      border-color: #3B3FA0;
      box-shadow: 0 0 0 2px #EAE9F6;
    }
    .chat-input-area button {
      padding: 12px 24px;
      background: #14171F;
      color: #FAFAF7;
      border: none;
      border-radius: 24px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: .15s;
      white-space: nowrap;
    }
    .chat-input-area button:hover {
      background: #2A2D78;
    }
    .chat-input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #F1F0E9;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #DFDDD3;
      font-size: 14px;
      color: #565A64;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    .error-msg {
      color: #B84438;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="brand"><span class="brand-mark"></span>NeuroCheck.ai</div>
    <span style="font-weight:400; font-size:14px; color:#B9B8C8;">🤖 AI Assistant</span>
    <button class="back-btn" onclick="window.location.href='app.html'">← Back</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message ai">
      👋 Hello! I'm your AI mental health assistant. How are you feeling today? Remember, I'm here to support you, but I'm not a substitute for a professional.
      <span class="time">Just now</span>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">🤖 AI is typing...</div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    // ===== Проверка доступа (только для Premium) =====
    const SESSION_KEY = 'ocd_session';
    const USERS_KEY = 'ocd_users';

    function getSession() { return localStorage.getItem(SESSION_KEY) || null; }
    function getUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch { return {}; }
    }
    function getUser(username) {
      const users = getUsers();
      return users[username] || null;
    }

    const currentUser = getSession();
    if (!currentUser) {
      alert('Please log in first.');
      window.location.href = 'login.html';
    }
    const user = getUser(currentUser);
    if (!user || user.subscription !== 'premium') {
      alert('AI Assistant is only available for Premium subscribers.');
      window.location.href = 'app.html';
    }

    // ===== DOM элементы =====
    const messagesContainer = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const errorMsg = document.getElementById('errorMsg');

    // ===== Отправка сообщения (реальная версия с OpenAI) =====
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      typingIndicator.style.display = 'block';
      errorMsg.style.display = 'none';

      try {
        // ✅ ПРАВИЛЬНЫЙ URL
        const PROXY_URL = 'https://openai-proxy-76rl.vercel.app/api/proxy';

        const response = await fetch(PROXY_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            messages: [
              {
                role: 'system',
                content: 'You are a mental health assistant. Be supportive, empathetic, and give practical advice. Never diagnose. If in crisis, suggest contacting a professional.'
              },
              { role: 'user', content: text }
            ],
            // ✅ ИЗМЕНЕНО: правильный алиас для FreeTheAi
            model: 'olm/deepseek-chat'
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to get response');
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        typingIndicator.style.display = 'none';
        addMessage(reply, 'ai');

      } catch (err) {
        typingIndicator.style.display = 'none';
        errorMsg.textContent = '❌ ' + err.message;
        errorMsg.style.display = 'block';
        console.error(err);
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `${text} <span class="time">${timeStr}</span>`;
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ===== Обработчики событий =====
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    userInput.focus();
  </script>
</body>
</html>
